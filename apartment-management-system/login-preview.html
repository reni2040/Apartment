<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Apartment Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@4.0.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-xl">
        <div class="bg-white rounded-lg shadow-md p-8">
            <div class="text-center mb-6">
                <img class="mx-auto h-12 w-auto" src="https://img.icons8.com/color/96/000000/apartment.png" alt="Apartment">
                <h2 class="mt-4 text-2xl font-bold text-gray-900">
                    Apartment Management System
                </h2>
                <p class="mt-2 text-sm text-gray-600">
                    Please sign in to continue
                </p>
            </div>
            
            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input type="email" name="email" id="email" required
                        class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
                        placeholder="admin@society.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <input type="password" name="password" id="password" required
                        class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
                        placeholder="Enter your password">
                </div>
                
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="remember" class="ml-2 block text-sm text-gray-900">
                            Remember me
                        </label>
                    </div>
                    
                    <div class="text-sm">
                        <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">
                            Forgot password?
                        </a>
                    </div>
                </div>
                
                <div>
                    <button type="submit"
                        class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:offset-2 focus-visible:outline-indigo-600">
                        Sign in
                    </button>
                </div>
            </form>
            
            <div class="mt-6 pt-6 border-t">
                <p class="text-sm text-gray-600 text-center mb-4">Demo Credentials:</p>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="bg-gray-50 p-2 rounded">
                        <strong>Admin:</strong> admin@society.com
                    </div>
                    <div class="bg-gray-50 p-2 rounded">
                        <strong>Owner:</strong> owner@society.com
                    </div>
                    <div class="bg-gray-50 p-2 rounded">
                        <strong>President:</strong> president@society.com
                    </div>
                    <div class="bg-gray-50 p-2 rounded">
                        <strong>Password:</strong> admin123 (all)
                    </div>
                </div>
            </div>
            
            <p class="text-center text-xs text-gray-500 mt-6">
                © 2026 Apartment Management System. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
